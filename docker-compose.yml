services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mitsubachi_ruby_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ruby:3.4.9
    working_dir: /rails
    command: >
      bash -lc "apt-get update -qq &&
      apt-get install --no-install-recommends -y build-essential libpq-dev postgresql-client &&
      bundle install &&
      bin/rails db:prepare &&
      bin/rails server -b 0.0.0.0 -p 3000"
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/mitsubachi_ruby_development
      RESEND_API_KEY: dummy
      MAIL_FROM: Mitsubachi <no-reply@example.com>
      FRONTEND_URL: http://localhost:3001
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
      - ./storage:/rails/storage
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./storage:/rails/storage:ro
    depends_on:
      - app

volumes:
  postgres_data:
  bundle:
