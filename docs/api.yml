        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    User:
      type: object
      properties:
        id:
          type: integer
        organization_id:
          type: integer
        organization_name:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        display_name:
          type: string
          nullable: true
        role:
          type: string
          enum: [member, organization_admin, system_admin]
        suspended:
