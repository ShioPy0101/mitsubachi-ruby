components:
  securitySchemes:
    cookieSession:
      type: apiKey
      in: cookie
      name: _mitsubachi_ruby_session
    flowerBearer:
      type: http
      scheme: bearer
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    ParentId:
      name: parent_id
      in: query
      schema:
        type: integer
        nullable: true
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
    Direction:
      name: direction
      in: query
      schema:
        type: string
        enum: [asc, desc]
  requestBodies:
    BulkIds:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [drive_item_ids]
            properties:
              drive_item_ids:
                type: array
                items:
                  type: integer
    BulkMove:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [drive_item_ids, parent_id]
            properties:
              drive_item_ids:
                type: array
                items:
                  type: integer
              parent_id:
                type: integer
                nullable: true
    DriveItemUpdate:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              parent_id:
                type: integer
                nullable: true
    DriveItemMove:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [parent_id]
            properties:
              parent_id:
                type: integer
                nullable: true
    OrganizationUpdate:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [organization]
            properties:
              organization:
                type: object
                properties:
                  name:
                    type: string
    UserUpdate:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [user]
            properties:
              user:
                type: object
                properties:
                  name:
                    type: string
                  email:
                    type: string
                    format: email
                  role:
                    type: string
                    enum: [member, organization_admin, system_admin]
                  organization_id:
                    type: integer
  responses:
    AccelRedirect:
      description: File delivery delegated to the reverse proxy.
      headers:
        X-Accel-Redirect:
          schema:
            type: string
        Content-Type:
          schema:
            type: string
        Content-Disposition:
          schema:
            type: string
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                oneOf:
                  - type: string
                  - type: object
    FlowerError:
      description: Flower API error response.
      content:
        application/json:
          schema:
            type: object
            required: [error]
            properties:
              error:
                type: object
                required: [code, message, request_id]
                properties:
                  code:
                    type: string
                    enum:
                      - invalid_request
                      - invalid_grant
                      - authorization_pending
                      - slow_down
                      - access_denied
                      - expired_token
                      - invalid_token
                      - insufficient_scope
                      - not_found
                      - conflict
                      - rate_limited
                      - internal_error
                  message:
                    type: string
                  request_id:
                    type: string
    Errors:
      description: Validation errors.
      content:
        application/json:
          schema:
            type: object
            required: [errors]
            properties:
              errors:
                type: array
                items:
                  type: string
    Forbidden:
      description: The current user is not allowed to perform this operation.
      content:
        application/json:
          schema:
            type: object
            required: [error]
            properties:
              error:
                type: object
                required: [code, message]
                properties:
                  code:
                    type: string
                    enum: [forbidden]
                  message:
                    type: string
    HealthOk:
      description: Health check succeeded.
      content:
        application/json:
          schema:
            type: object
            required: [status]
            properties:
              status:
                type: string
                enum: [ok]
    HealthUnavailable:
      description: Health check failed.
      content:
        application/json:
          schema:
            type: object
            required: [status]
            properties:
              status:
                type: string
                enum: [unavailable]
    Message:
      description: Message response.
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              message:
                type: string
    Paginated:
      description: Paginated collection.
      content:
        application/json:
          schema:
            type: object
            required: [data, meta]
            properties:
              data:
                type: array
                items:
                  type: object
              meta:
                $ref: "#/components/schemas/PaginationMeta"
    Unauthorized:
      description: Authentication is required or the session is rejected.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    NotFound:
      description: Resource was not found or is outside the tenant boundary.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                oneOf:
                  - type: string
                  - type: object
    ValidationError:
      description: Validation failed.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              errors:
                type: array
                items:
                  type: string
  schemas:
    AdminDriveItem:
      type: object
      properties:
        id:
          type: integer
        organization_id:
          type: integer
        organization_name:
          type: string
        owner_user_id:
          type: integer
        owner_email:
          type: string
          format: email
        parent_id:
          type: integer
          nullable: true
        name:
          type: string
        item_type:
          type: string
          enum: [file, directory]
        extension:
          type: string
          nullable: true
        content_type:
          type: string
          nullable: true
        file_size:
          type: integer
          nullable: true
        upload_ip_address:
          type: string
          nullable: true
        uploaded_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        breadcrumbs:
          type: array
          items:
            $ref: "#/components/schemas/DriveBreadcrumb"
    DriveBreadcrumb:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        name:
          type: string
    DriveItem:
      type: object
      properties:
        id:
          type: integer
        organization_id:
          type: integer
        owner_user_id:
          type: integer
        owner_display_name:
          type: string
          nullable: true
        parent_id:
          type: integer
          nullable: true
        parent_name:
          type: string
          nullable: true
        name:
          type: string
        item_type:
          type: string
          enum: [file, directory]
        extension:
          type: string
          nullable: true
        storage_key:
          type: string
          nullable: true
        blob_path:
          type: string
          nullable: true
        content_type:
          type: string
          nullable: true
        file_hash:
          type: string
          nullable: true
        file_size:
          type: integer
          nullable: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Group:
      type: object
