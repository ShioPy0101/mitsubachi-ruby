log_format external_share_safe '$remote_addr - $remote_user [$time_local] '
                               '"$request_method external-share" $status $body_bytes_sent '
                               '"$http_referer" "$http_user_agent"';

upstream rails_app {
  server app:3000;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 1g;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  location /internal/storage/ {
    internal;
    alias /rails/storage/;
  }

  location ~ ^/(share|api/v1/public/shares)/ {
    access_log /var/log/nginx/external_share_access.log external_share_safe;
    proxy_pass http://rails_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  location / {
    proxy_pass http://rails_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }
}
